        <circle cx="86" cy="28" r="5" fill="currentColor" stroke="none"/>
        <circle cx="14" cy="72" r="5" fill="currentColor" stroke="none"/>
        <circle cx="9" cy="50" r="5" fill="currentColor" stroke="none"/>

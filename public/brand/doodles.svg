      <circle cx="50" cy="88" r="7" fill="#ffeb3b"/>
      <circle cx="16" cy="30" r="5" fill="#f45a1d"/>
      <circle cx="84" cy="70" r="5" fill="#00bcd4"/>
      <circle cx="84" cy="30" r="6" fill="#e91e63"/>
      <circle cx="16" cy="70" r="5" fill="#ffeb3b"/>
      <circle cx="10" cy="50" r="5" fill="#2c2c2c"/>
